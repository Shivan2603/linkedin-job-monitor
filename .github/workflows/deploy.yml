name: Deploy Monitor + Data to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Merge monitor/ + data/ into a single deploy artifact
      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp -r monitor/. _site/
          mkdir -p _site/data
          # Copy real bot data if it exists, otherwise create empty files
          if [ -f data/applications.json ]; then
            cp data/applications.json _site/data/applications.json
          else
            echo "[]" > _site/data/applications.json
          fi
          if [ -f data/logs.json ]; then
            cp data/logs.json _site/data/logs.json
          else
            echo "[]" > _site/data/logs.json
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
